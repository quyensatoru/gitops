apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "app.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
data:
{{- range $key, $value := .Values.appConfig }}
  {{ $key }}: "{{ $value }}"
{{- end }}
  RABBITMQ_HOST: "{{ .Release.Name }}-rabbitmq"
  RABBITMQ_PORT: "5672"
  RABBITMQ_USER: "{{ .Values.rabbitmq.auth.username }}"
  RABBITMQ_PASSWORD: "{{ .Values.rabbitmq.auth.password }}"
  REDIS_HOST: "{{ .Release.Name }}-redis"
  REDIS_PORT: "6379"
  MONGODB_HOST: "{{ .Release.Name }}-mongodb"
  MONGODB_PORT: "27017"